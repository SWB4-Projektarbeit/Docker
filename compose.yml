services:
    backend:
        build: Backend
        environment:
            - SERVER_PORT=${SERVER_PORT}
            - DUMMYDATA=${DUMMYDATA}
            - TEMPLATES_FOLDER=${TEMPLATES_FOLDER}
            - FRONTEND_URL=${FRONTEND_URL}
            - DISPLAYSERVER_URL=${DISPLAYSERVER_URL}
            - HEONLINE_URL=${HEONLINE_URL}
            - HEONLINE_KEYCLOAK_URL=${HEONLINE_KEYCLOAK_URL}
            - HEONLINE_KEYCLOAK_REALM=${HEONLINE_KEYCLOAK_REALM}
            - HEONLINE_KEYCLOAK_CLIENT-ID=${HEONLINE_KEYCLOAK_CLIENT-ID}
            - HEONLINE_KEYCLOAK_CLIENT-SECRET=${HEONLINE_KEYCLOAK_CLIENT-SECRET}
            - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SWT-PROJECT-BFF_CLIENT-ID=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SWT-PROJECT-BFF_CLIENT-ID}
            - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SWT-PROJECT-BFF_CLIENT-SECRET=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SWT-PROJECT-BFF_CLIENT-SECRET}
            - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SWT-PROJECT-BFF_REDIRECT-URI=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SWT-PROJECT-BFF_REDIRECT-URI}
            - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SWT-PROJECT-BFF_CLIENT-NAME=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_SWT-PROJECT-BFF_CLIENT-NAME}
            - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK-LOCAL_ISSUER-URI=${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK-LOCAL_ISSUER-URI}
        command: /bin/bash -c "mvn spring-boot:run"
        network_mode: host
        restart: unless-stopped
    frontend:
        build: Frontend
        command: /bin/bash -c "ng serve"
        network_mode: host
        restart: unless-stopped
        depends_on:
            backend:
                condition: service_started
                restart: true
