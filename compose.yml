services:
    backend:
        build: Backend
        env_file: ".env"
        volumes:
            - ${TEMPLATE_FOLDER}:/timesy/templates/
        command: /bin/bash -c "mvn spring-boot:run"
        network_mode: host
        restart: unless-stopped
    frontend:
        build: Frontend
        command: /bin/bash -c "ng serve"
        network_mode: host
        restart: unless-stopped
        depends_on:
            backend:
                condition: service_started
                restart: true
